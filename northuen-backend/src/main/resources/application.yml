spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: northuen-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/northuen}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:2}
      minimum-idle: ${DB_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:900000}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:120}
  google:
    server-api-key: ${GOOGLE_SERVER_API_KEY:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
