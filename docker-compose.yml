services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: northuen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - northuen_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d northuen"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./northuen-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8081
      DATABASE_URL: jdbc:postgresql://postgres:5432/northuen
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: replace-with-at-least-32-byte-secret-for-production
      JWT_EXPIRATION_MS: 86400000
      ALLOWED_ORIGIN_PATTERNS: http://localhost:*,http://127.0.0.1:*
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS_PER_MINUTE: 120
      ADMIN_EMAIL: admin@northuen.bt
      ADMIN_PASSWORD: change-this-admin-password
      ADMIN_FULL_NAME: Northuen Admin
      ADMIN_PHONE: "+97517000000"
      DEMO_DATA_ENABLED: "true"
    ports:
      - "8081:8081"

volumes:
  northuen_pg:
