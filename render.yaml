services:
  - type: web
    name: northuen-backend
    runtime: docker
    repo: https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
    rootDir: northuen-backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /v3/api-docs
    envVars:
      - key: PORT
        value: 8081
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: ALLOWED_ORIGIN_PATTERNS
        value: https://*,http://localhost:*,http://127.0.0.1:*
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_REQUESTS_PER_MINUTE
        value: 120
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULL_NAME
        value: Northuen Admin
      - key: ADMIN_PHONE
        sync: false
      - key: DEMO_DATA_ENABLED
        value: false
