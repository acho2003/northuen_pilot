services:
  - type: web
    name: northuen-backend
    runtime: docker
    repo: https://github.com/acho2003/northuen_pilot
    rootDir: northuen-backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8081
      - key: SERVER_ADDRESS
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DB_MAX_POOL_SIZE
        value: 2
      - key: DB_MIN_IDLE
        value: 0
      - key: DB_CONNECTION_TIMEOUT_MS
        value: 30000
      - key: DB_IDLE_TIMEOUT_MS
        value: 300000
      - key: DB_MAX_LIFETIME_MS
        value: 900000
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: ALLOWED_ORIGIN_PATTERNS
        value: https://*,http://localhost:*,http://127.0.0.1:*
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_REQUESTS_PER_MINUTE
        value: 120
      - key: GOOGLE_SERVER_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULL_NAME
        value: Northuen Admin
      - key: ADMIN_PHONE
        sync: false
      - key: DEMO_DATA_ENABLED
        value: false
